# Enable modified key reporting (fixes Pi warning)
set -g extended-keys on

# True color + mouse + bigger scrollback
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,*256col*:RGB"
set -g mouse on
set -g history-limit 50000
set -g focus-events on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"

# Load catppuccin before status modules are referenced.
# TPM clones catppuccin/tmux into ~/.tmux/plugins/tmux/, but our install
# uses ~/.tmux/plugins/catppuccin/ — source whichever exists.
if-shell '[ -d ~/.tmux/plugins/catppuccin ]' \
  "run ~/.tmux/plugins/catppuccin/catppuccin.tmux" \
  "run ~/.tmux/plugins/tmux/catppuccin.tmux"

# Status line (must come after catppuccin loads its status modules)
set -g status-position bottom
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_uptime}"

run '~/.tmux/plugins/tpm/tpm'
